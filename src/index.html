<!DOCTYPE html>
<html lang="it">
<head>
  <script>
    window.addEventListener("error", function(e) {
      console.error(e.message + " in " + e.filename + ":" + e.lineno);
    });
    window.addEventListener("unhandledrejection", function(e) {
      console.error("Unhandled Rejection: " + e.reason);
    });
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:11434 https://raw.githubusercontent.com https://api.github.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
  <script src="js/chart.umd.js"></script>
  <title>Simulatore Preventivi</title>

<body>
  <div id="app">
    <div id="pin-overlay" class="hidden">
      <div class="pin-card">
        <div class="pin-logo">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <div class="pin-title" id="pin-title">Inserisci PIN</div>
        <div class="pin-subtitle" id="pin-subtitle">Inserisci il tuo PIN a 6 cifre per accedere</div>
        <div class="pin-inputs" id="pin-inputs">
          <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" id="pin-0" autocomplete="off">
          <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" id="pin-1" autocomplete="off">
          <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" id="pin-2" autocomplete="off">
          <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" id="pin-3" autocomplete="off">
          <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" id="pin-4" autocomplete="off">
          <input class="pin-digit" type="text" inputmode="numeric" maxlength="1" id="pin-5" autocomplete="off">
        </div>
        <div class="pin-error-msg" id="pin-error-msg"></div>
        <button class="pin-btn-confirm" id="pin-confirm-btn" disabled>Accedi</button>
        <button class="pin-clear-btn" id="pin-clear-btn">Cancella tutto</button>
        <div class="pin-attempts-msg" id="pin-attempts-msg"></div>
      </div>
    </div>
    <div id="splash">
      <div class="splash-inner">
        <div class="splash-logo">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <rect width="64" height="64" rx="16" fill="url(#splashGrad)"/>
            <path d="M14 20h36M14 32h24M14 44h28" stroke="white" stroke-width="3" stroke-linecap="round"/>
            <circle cx="46" cy="44" r="8" fill="#5c6bc0" stroke="white" stroke-width="2"/>
            <path d="M43 44l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="splashGrad" x1="0" y1="0" x2="64" y2="64">
                <stop offset="0%" stop-color="#1a237e"/>
                <stop offset="100%" stop-color="#3949ab"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="splash-title">Simulatore Preventivi</h1>
        <p class="splash-sub">Caricamento in corso...</p>
        <p id="splash-version" style="margin-top: 10px; font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 0.05em;"></p>
        <div class="splash-bar"><div class="splash-fill"></div></div>
      </div>
    </div>

            <span class="sidebar-version">v1.0</span>
