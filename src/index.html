<!DOCTYPE html>
<html lang="it">
<head>
  <script>
    window.addEventListener("error", function(e) {
      console.error(e.message + " in " + e.filename + ":" + e.lineno);
    });
    window.addEventListener("unhandledrejection", function(e) {
      console.error("Unhandled Rejection: " + e.reason);
    });
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;">
  <script src="js/chart.umd.js"></script>
  <title>Simulatore Preventivi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
  <div id="app">
    <!-- Splash screen -->
    <div id="splash">
      <div class="splash-inner">
        <div class="splash-logo">
          <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
            <rect width="64" height="64" rx="16" fill="url(#splashGrad)"/>
            <path d="M14 20h36M14 32h24M14 44h28" stroke="white" stroke-width="3" stroke-linecap="round"/>
            <circle cx="46" cy="44" r="8" fill="#5c6bc0" stroke="white" stroke-width="2"/>
            <path d="M43 44l2 2 4-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="splashGrad" x1="0" y1="0" x2="64" y2="64">
                <stop offset="0%" stop-color="#1a237e"/>
                <stop offset="100%" stop-color="#3949ab"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="splash-title">Simulatore Preventivi</h1>
        <p class="splash-sub">Caricamento in corso...</p>
        <div class="splash-bar"><div class="splash-fill"></div></div>
      </div>
    </div>

    <!-- Main layout -->
    <div id="main-layout" class="hidden">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-logo">
          <button id="sidebar-toggle" class="btn-icon" style="color:white; margin-right:8px;" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <svg width="32" height="32" viewBox="0 0 64 64" fill="none">
            <rect width="64" height="64" rx="12" fill="url(#sidebarGrad)"/>
            <path d="M14 20h36M14 32h24M14 44h28" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="46" cy="44" r="8" fill="#5c6bc0"/>
            <path d="M43 44l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <defs>
              <linearGradient id="sidebarGrad" x1="0" y1="0" x2="64" y2="64">
                <stop offset="0%" stop-color="#1a237e"/>
                <stop offset="100%" stop-color="#283593"/>
              </linearGradient>
            </defs>
          </svg>
          <div class="sidebar-logo-text">
            <span class="sidebar-app-name">Preventivi</span>
            <span class="sidebar-version">v1.0</span>
          </div>
        </div>

        <nav class="sidebar-nav">
          <div class="nav-section-label">PRINCIPALE</div>
          <button class="nav-item active" id="nav-dashboard" onclick="window.Router.navigate('dashboard')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            <span>Dashboard</span>
          </button>
          <button class="nav-item" id="nav-preventivi" onclick="window.Router.navigate('preventivi')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span>Preventivi</span>
          </button>
          <button class="nav-item" id="nav-clienti" onclick="window.Router.navigate('clienti')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Rubrica Clienti</span>
          </button>
          <button class="nav-item" id="nav-magazzino" onclick="window.Router.navigate('magazzino')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            <span>Magazzino</span>
          </button>
          <button class="nav-item" id="nav-collaboratori" onclick="window.Router.navigate('collaboratori')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            <span>Collaboratori</span>
          </button>

          <div class="nav-section-label" style="margin-top:16px">SISTEMA</div>
          <button class="nav-item" id="nav-impostazioni" onclick="window.Router.navigate('impostazioni')">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            <span>Impostazioni</span>
          </button>
        </nav>

        <div class="sidebar-footer">
          <div class="sidebar-backup-btn" id="btn-backup" title="Esegui backup manuale">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="14" height="14"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Backup dati
          </div>
        </div>
      </aside>

      <!-- Content area -->
      <main id="content">
        <div id="page-dashboard" class="page active"></div>
        <div id="page-preventivi" class="page"></div>
        <div id="page-preventivo-detail" class="page"></div>
        <div id="page-clienti" class="page"></div>
        <div id="page-magazzino" class="page"></div>
        <div id="page-collaboratori" class="page"></div>
        <div id="page-collaboratore-detail" class="page"></div>
        <div id="page-impostazioni" class="page"></div>
      </main>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-box">
      <div id="modal-header">
        <h3 id="modal-title"></h3>
        <button id="modal-close" class="btn-icon">✕</button>
      </div>
      <div id="modal-body"></div>
      <div id="modal-footer"></div>
    </div>
  </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
